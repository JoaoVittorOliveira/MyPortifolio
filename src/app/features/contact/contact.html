<section class="split-section">
  <div class="section-title-col">
    <h3>Contact</h3>
  </div>
  <div class="section-content-col">
    
    <div class="chat-container">
      
      <div class="chat-top">
        <div class="chat-message">
          <div class="red-block chat-avatar"></div>
          <div class="chat-bubble">
            Olá! O que você gostaria de saber sobre minha trajetória ou projetos?
          </div>
        </div>
      </div>

      <div class="chat-bottom">
        
        <div class="chat-suggestions">
          <span class="suggestion-pill">Pode me mostrar exemplos dos seus projetos?</span>
          <span class="suggestion-pill">Como foi desenvolver o Sensor de Vazão no Hackathon?</span>
          <span class="suggestion-pill">Quais tecnologias backend você domina?</span>
          <span class="suggestion-pill">Por que contratar um dev júnior com experiência em IoT?</span>
        </div>

        <div class="chat-input-row">
          <button class="social-btn">𝕏</button>
          <button class="social-btn">✉</button>
          <button class="social-btn">in</button>
          
          <div class="input-wrapper">
            <input type="text" placeholder="Message..." class="chat-input" disabled>
          </div>
        </div>

      </div>
    </div>

  </div>
</section>
